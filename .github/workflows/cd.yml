name: cd

# CD chi chay khi CI workflow da chay xong tren nhanh main.
on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override (default: commit SHA)"
        required: false
        type: string

env:
  GCP_REGION: us-central1
  AR_REPOSITORY: micro-commerce
  TF_DIR: .cicd/.terraform
  SERVICE_NAME: orders

jobs:
  setup-prisma:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client (orders)
        run: pnpm --filter orders exec prisma generate --schema prisma/schema.prisma

  deploy-orders:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    needs: setup-prisma
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source at CI SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve runtime service account
        id: runtime_sa
        run: |
          if [ -n "${{ secrets.RUNTIME_SA_EMAIL }}" ]; then
            SA_EMAIL="${{ secrets.RUNTIME_SA_EMAIL }}"
          else
            SA_EMAIL="$(gcloud config get-value account)"
          fi
          echo "email=$SA_EMAIL" >> "$GITHUB_OUTPUT"
          echo "Using runtime service account: $SA_EMAIL"

      # Setup Terraform CLI de chay init/plan/apply.
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      # Tao full image URL theo immutable tag = commit SHA.
      - name: Resolve deploy tag
        id: deploy_tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG="${{ github.event.workflow_run.head_sha }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      # Tao full image URL theo resolved tag.
      - name: Build deploy image reference
        id: image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ steps.deploy_tag.outputs.tag }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Deploying image: $IMAGE"

      # Can docker pull image tu Artifact Registry de chay migrate.
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      # Plan de thay ro thay doi truoc khi apply.
      - name: Terraform plan (orders)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="artifact_repository=${{ env.AR_REPOSITORY }}" \
            -var="service=${{ env.SERVICE_NAME }}" \
            -var="image=${{ steps.image.outputs.image }}" \
            -var="runtime_service_account_email=${{ steps.runtime_sa.outputs.email }}" \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="redis_host=${{ secrets.REDIS_HOST }}" \
            -var="redis_port=${{ secrets.REDIS_PORT || '6379' }}" \
            -var="redis_username=${{ secrets.REDIS_USERNAME }}" \
            -var="redis_password=${{ secrets.REDIS_PASSWORD }}"

      # Apply tu dong sau khi CI da pass.
      - name: Terraform apply (orders)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="artifact_repository=${{ env.AR_REPOSITORY }}" \
            -var="service=${{ env.SERVICE_NAME }}" \
            -var="image=${{ steps.image.outputs.image }}" \
            -var="runtime_service_account_email=${{ steps.runtime_sa.outputs.email }}" \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="redis_host=${{ secrets.REDIS_HOST }}" \
            -var="redis_port=${{ secrets.REDIS_PORT || '6379' }}" \
            -var="redis_username=${{ secrets.REDIS_USERNAME }}" \
            -var="redis_password=${{ secrets.REDIS_PASSWORD }}"

      # Smoke test endpoint /health de fail som neu deploy loi runtime.
      - name: Smoke test /health
        working-directory: ${{ env.TF_DIR }}
        run: |
          URL=$(terraform output -raw service_url)
          echo "Service URL: $URL"
          curl -fsS "$URL/health"
