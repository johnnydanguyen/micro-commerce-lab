name: cd

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: "commit SHA"
        required: false
        type: string

env:
  GCP_REGION: us-central1
  AR_REPOSITORY: micro-commerce

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      deploy_tag: ${{ steps.prepare_outputs.outputs.deploy_tag }}
      deploy_env: ${{ steps.prepare_outputs.outputs.deploy_env }}
      backend_file: ${{ steps.prepare_outputs.outputs.backend_file }}
    steps:
      - name: Resolve deploy metadata
        id: prepare_outputs
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            DEPLOY_TAG="${{ inputs.image_tag }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            DEPLOY_TAG="${{ github.event.workflow_run.head_sha }}"
          else
            DEPLOY_TAG="${{ github.sha }}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.environment }}" ]; then
            DEPLOY_ENV="${{ inputs.environment }}"
          else
            DEPLOY_ENV="dev"
          fi

          BACKEND_FILE=".cicd/terraform/environments/${DEPLOY_ENV}/backend.hcl"

          echo "deploy_tag=$DEPLOY_TAG" >> "$GITHUB_OUTPUT"
          echo "deploy_env=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "backend_file=$BACKEND_FILE" >> "$GITHUB_OUTPUT"

  setup-prisma:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client (orders)
        run: pnpm --filter orders exec prisma generate --schema prisma/schema.prisma

  deploy_orders:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    needs: [prepare, setup-prisma]
    runs-on: ubuntu-latest
    outputs:
      service_url: ${{ steps.orders_output.outputs.service_url }}
    steps:
      - name: Checkout source at CI SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve runtime service account
        id: runtime_sa
        run: |
          if [ -n "${{ secrets.RUNTIME_SA_EMAIL }}" ]; then
            SA_EMAIL="${{ secrets.RUNTIME_SA_EMAIL }}"
          else
            SA_EMAIL="$(gcloud config get-value account)"
          fi
          echo "email=$SA_EMAIL" >> "$GITHUB_OUTPUT"
          echo "Using runtime service account: $SA_EMAIL"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Build deploy image reference
        id: image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/orders:${{ needs.prepare.outputs.deploy_tag }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Deploying image: $IMAGE"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.REDIS_HOST }}" ]; then
            echo "Missing required secret: REDIS_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "Missing required secret for orders: DATABASE_URL"
            exit 1
          fi

      - name: Terraform init
        working-directory: .cicd/terraform/stacks/orders-app
        run: |
          terraform init \
            -backend-config="${{ github.workspace }}/${{ needs.prepare.outputs.backend_file }}" \
            -backend-config="prefix=micro-commerce/${{ needs.prepare.outputs.deploy_env }}/orders-app"

      - name: Terraform plan
        working-directory: .cicd/terraform/stacks/orders-app
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="service_name=orders" \
            -var="image=${{ steps.image.outputs.image }}" \
            -var="runtime_service_account_email=${{ steps.runtime_sa.outputs.email }}" \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="redis_host=${{ secrets.REDIS_HOST }}" \
            -var="redis_port=${{ secrets.REDIS_PORT || '6379' }}" \
            -var="redis_username=${{ secrets.REDIS_USERNAME }}" \
            -var="redis_password=${{ secrets.REDIS_PASSWORD }}"

      - name: Terraform apply
        working-directory: .cicd/terraform/stacks/orders-app
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="service_name=orders" \
            -var="image=${{ steps.image.outputs.image }}" \
            -var="runtime_service_account_email=${{ steps.runtime_sa.outputs.email }}" \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="redis_host=${{ secrets.REDIS_HOST }}" \
            -var="redis_port=${{ secrets.REDIS_PORT || '6379' }}" \
            -var="redis_username=${{ secrets.REDIS_USERNAME }}" \
            -var="redis_password=${{ secrets.REDIS_PASSWORD }}"

      - name: Capture orders service URL
        id: orders_output
        working-directory: .cicd/terraform/stacks/orders-app
        run: |
          URL=$(terraform output -raw service_url)
          echo "service_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Orders service URL: $URL"

      - name: Smoke test /health
        working-directory: .cicd/terraform/stacks/orders-app
        run: |
          curl -fsS "${{ steps.orders_output.outputs.service_url }}/health"

  deploy_payments:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    needs: [prepare, setup-prisma, deploy_orders]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source at CI SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve runtime service account
        id: runtime_sa
        run: |
          if [ -n "${{ secrets.RUNTIME_SA_EMAIL }}" ]; then
            SA_EMAIL="${{ secrets.RUNTIME_SA_EMAIL }}"
          else
            SA_EMAIL="$(gcloud config get-value account)"
          fi
          echo "email=$SA_EMAIL" >> "$GITHUB_OUTPUT"
          echo "Using runtime service account: $SA_EMAIL"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Build deploy image reference
        id: image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/payments-worker:${{ needs.prepare.outputs.deploy_tag }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Deploying image: $IMAGE"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.REDIS_HOST }}" ]; then
            echo "Missing required secret: REDIS_HOST"
            exit 1
          fi
          if [ -z "${{ needs.deploy_orders.outputs.service_url }}" ]; then
            echo "Missing required output from deploy_orders: service_url"
            exit 1
          fi

      - name: Terraform init
        working-directory: .cicd/terraform/stacks/payments-app
        run: |
          terraform init \
            -backend-config="${{ github.workspace }}/${{ needs.prepare.outputs.backend_file }}" \
            -backend-config="prefix=micro-commerce/${{ needs.prepare.outputs.deploy_env }}/payments-app"

      - name: Terraform plan
        working-directory: .cicd/terraform/stacks/payments-app
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="service_name=payments-worker" \
            -var="image=${{ steps.image.outputs.image }}" \
            -var="runtime_service_account_email=${{ steps.runtime_sa.outputs.email }}" \
            -var="orders_service_url=${{ needs.deploy_orders.outputs.service_url }}" \
            -var="redis_host=${{ secrets.REDIS_HOST }}" \
            -var="redis_port=${{ secrets.REDIS_PORT || '6379' }}" \
            -var="redis_username=${{ secrets.REDIS_USERNAME }}" \
            -var="redis_password=${{ secrets.REDIS_PASSWORD }}"

      - name: Terraform apply
        working-directory: .cicd/terraform/stacks/payments-app
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="service_name=payments-worker" \
            -var="image=${{ steps.image.outputs.image }}" \
            -var="runtime_service_account_email=${{ steps.runtime_sa.outputs.email }}" \
            -var="orders_service_url=${{ needs.deploy_orders.outputs.service_url }}" \
            -var="redis_host=${{ secrets.REDIS_HOST }}" \
            -var="redis_port=${{ secrets.REDIS_PORT || '6379' }}" \
            -var="redis_username=${{ secrets.REDIS_USERNAME }}" \
            -var="redis_password=${{ secrets.REDIS_PASSWORD }}"
