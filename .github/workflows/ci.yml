name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  GCP_REGION: us-central1
  AR_REPOSITORY: micro-commerce

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client (orders)
        run: pnpm --filter orders exec prisma generate --schema prisma/schema.prisma

      - name: Lint (orders)
        run: pnpm --filter orders lint

      - name: Lint (payments-worker)
        run: pnpm --filter payments-worker lint

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client (orders)
        run: pnpm --filter orders exec prisma generate --schema prisma/schema.prisma

      - name: Unit Test (orders)
        run: pnpm --filter orders test -- --testPathPattern='\.spec\.ts$' --testPathIgnorePatterns='int\.spec\.ts$'

      # - name: Unit Test (payments-worker)
      #   run: pnpm --filter payments-worker test

  integration-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orders_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d orders_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/orders_test?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client (orders)
        run: pnpm --filter orders exec prisma generate --schema prisma/schema.prisma

      - name: Apply Prisma Migrations (orders)
        run: pnpm --filter orders exec prisma migrate deploy --schema prisma/schema.prisma

      - name: Integration Test (orders)
        run: pnpm --filter orders test -- --testPathPattern='int\.spec\.ts$'

  build:
    runs-on: ubuntu-latest
    needs: [lint, unit-test, integration-test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client (orders)
        run: pnpm --filter orders exec prisma generate --schema prisma/schema.prisma

      - name: Build (orders)
        run: pnpm --filter orders build

      - name: Build (payments-worker)
        run: pnpm --filter payments-worker build

  push-images:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push orders image
        run: |
          docker build -f apps/orders/Dockerfile \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/orders:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/orders:latest \
            .
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/orders:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/orders:latest

      - name: Build and push payments-worker image
        run: |
          docker build -f apps/payments-worker/Dockerfile \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/payments-worker:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/payments-worker:latest \
            .
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/payments-worker:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/payments-worker:latest
